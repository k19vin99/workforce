{% extends "base_apps.html" %}

{% block content %}
<div class="container mt-5">
    <h1>Cambiar Contraseña</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Cambiar Contraseña</button>
    </form>
    <a href="{% url 'profile' %}" class="btn btn-secondary mt-3">Cancelar</a>
</div>
{% endblock %}
